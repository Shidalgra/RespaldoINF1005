<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab 5 - Promesas y Async</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      rel="icon"
      type="image/png"
      href="assets/images/Logo_Activando_El_Coeficiente_Intelectual_Tab.png"
    />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body>
    <div class="main-wrapper">
      <header>
        <h1>Soporte Técnico Universitario</h1>
        <p>Validación de Credenciales de Usuario (Moulo Asíncrono)</p>
      </header>
      <section class="control-panel">
        <div class="input-group">
          <label for="user-id">Ingrese ID de Estudiante:</label>
          <input
            type="number"
            id="user-id"
            placeholder="Ejemplo: 101"
            min="1"
          />
        </div>
        <div class="button-group">
          <button id="btn-validar" class="btn-primary">
            Iniciar Validación Async
          </button>
        </div>
      </section>
      <!-- Cerramos la sección -->
      <div id="resultado-lab" class="output-cantainer">
        <p class="placeholder-text">Esperando interacción del usuario...</p>
      </div>
      <footer class="info-box">
        <small>Temas evaluados: setTimeOut, Promises, Async/Await, DOM
          Manipulation.</small>
      </footer>
    </div>
    <script src="assets/js/asincronia-avanzada.js"></script>
  </body>
</html>
